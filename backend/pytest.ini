[pytest]
# Configuração pytest do AgroJus — Anti-Vibe Coding: disciplina sobre vibração.
#
# Categorias (selecione com -m "categoria"):
#   unit         — lógica pura, sem I/O, sem banco, sem rede (mais rápido)
#   integration  — toca banco real em container, endpoints FastAPI
#   contract     — APIs externas com cassettes VCR (DataJud, DJEN, CKAN etc.)
#   collectors   — 1 arquivo por coletor; validam schema e presença de dados
#   live         — opt-in; bate upstream real; usado na auditoria semanal
#   e2e          — fluxos completos (login → busca → dossiê → PDF)
#   slow         — testes demorados (>2s); pulados em runs rápidos
#
# Execução típica:
#   pytest -m unit                  # dev loop rápido
#   pytest -m "not live and not slow"  # CI padrão
#   pytest -m live                  # auditoria de coletores (health upstream)
#   pytest -m e2e                   # antes de release

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: lógica pura, sem I/O
    integration: banco + endpoints
    contract: VCR cassettes para APIs externas
    collectors: valida um coletor específico
    live: opt-in; bate upstream real (auditoria)
    e2e: fluxo completo
    slow: >2s

addopts =
    --strict-markers
    --strict-config
    -ra
    --tb=short
    --durations=10

# Timeout padrão (pytest-timeout): 30s — testes acima disso devem ser marcados @pytest.mark.slow
timeout = 30

filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
    ignore::pytest.PytestUnraisableExceptionWarning

asyncio_mode = auto
