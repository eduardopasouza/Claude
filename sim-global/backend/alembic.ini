# Alembic configuration for sim-global.
#
# A URL real é injetada em runtime por alembic/env.py a partir da
# variável de ambiente SIMGLOBAL_DATABASE_URL ou, na falta dela, de
# config.yaml (chave persistence.database_url, resolvida a partir da
# raiz do projeto).
#
# O comando padrão para aplicar migrations é:
#     cd backend && alembic upgrade head

[alembic]
script_location = alembic
prepend_sys_path = src
path_separator = os

# Placeholder; o env.py sobrescreve.
sqlalchemy.url = sqlite:///saves/simglobal.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
