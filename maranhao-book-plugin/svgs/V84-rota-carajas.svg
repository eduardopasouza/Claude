<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="450" fill="#FAF3E8"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#2B2B2B">FERROVIA CARAJÁS — O Paradoxo dos Bilhões</text>

  <!-- Route line -->
  <line x1="100" y1="200" x2="700" y2="200" stroke="#C8952E" stroke-width="6"/>

  <!-- Nodes -->
  <!-- Carajás -->
  <circle cx="100" cy="200" r="20" fill="#B5533E"/>
  <text x="100" y="160" text-anchor="middle" font-size="12" font-weight="bold" fill="#B5533E">CARAJÁS</text>
  <text x="100" y="175" text-anchor="middle" font-size="9" fill="#2B2B2B">Serra dos Carajás (PA)</text>
  <text x="100" y="240" text-anchor="middle" font-size="10" fill="#B5533E">Extração</text>
  <text x="100" y="255" text-anchor="middle" font-size="9" fill="#888888">336M ton/ano (2025)</text>

  <!-- Açailândia -->
  <circle cx="300" cy="200" r="14" fill="#C8952E"/>
  <text x="300" y="165" text-anchor="middle" font-size="11" font-weight="bold" fill="#C8952E">AÇAILÂNDIA</text>
  <text x="300" y="240" text-anchor="middle" font-size="9" fill="#888888">Conexão FNS</text>

  <!-- São Luís -->
  <circle cx="500" cy="200" r="18" fill="#1B4965"/>
  <text x="500" y="160" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B4965">SÃO LUÍS</text>
  <text x="500" y="175" text-anchor="middle" font-size="9" fill="#2B2B2B">Ponta da Madeira</text>
  <text x="500" y="240" text-anchor="middle" font-size="10" fill="#1B4965">Embarque</text>
  <text x="500" y="255" text-anchor="middle" font-size="9" fill="#888888">192M ton (2024)</text>

  <!-- China -->
  <circle cx="700" cy="200" r="16" fill="#C1292E"/>
  <text x="700" y="165" text-anchor="middle" font-size="12" font-weight="bold" fill="#C1292E">CHINA</text>
  <text x="700" y="240" text-anchor="middle" font-size="10" fill="#C1292E">Destino</text>
  <text x="700" y="255" text-anchor="middle" font-size="9" fill="#888888">74,7% exportações</text>

  <!-- Arrow oceano -->
  <line x1="520" y1="200" x2="680" y2="200" stroke="#1B4965" stroke-width="3" stroke-dasharray="10,5"/>
  <polygon points="680,194 695,200 680,206" fill="#1B4965"/>

  <!-- Train icon simplified -->
  <rect x="180" y="190" width="40" height="20" fill="#C8952E" rx="3"/>
  <text x="200" y="205" text-anchor="middle" font-size="8" fill="white" font-weight="bold">EFC</text>

  <!-- Data boxes -->
  <rect x="50" y="300" width="320" height="80" fill="#2B2B2B" rx="8"/>
  <text x="210" y="325" text-anchor="middle" font-size="11" fill="#C8952E" font-weight="bold">O QUE PASSA</text>
  <text x="210" y="345" text-anchor="middle" font-size="10" fill="#FAF3E8">192 milhões de toneladas de minério/ano</text>
  <text x="210" y="360" text-anchor="middle" font-size="10" fill="#FAF3E8">Superávit comercial: US$ 1,6 bilhão</text>

  <rect x="430" y="300" width="320" height="80" fill="#C1292E" rx="8"/>
  <text x="590" y="325" text-anchor="middle" font-size="11" fill="#FAF3E8" font-weight="bold">O QUE FICA</text>
  <text x="590" y="345" text-anchor="middle" font-size="10" fill="#FAF3E8">PIB per capita: R$ 20.632</text>
  <text x="590" y="360" text-anchor="middle" font-size="10" fill="#FAF3E8">Esgoto tratado: 13,6%</text>

  <!-- Footer -->
  <text x="400" y="415" text-anchor="middle" font-size="11" fill="#2B2B2B" font-weight="bold">Do algodão ao minério. De Pombal à Vale. De Manchester a Pequim.</text>
  <text x="400" y="435" text-anchor="middle" font-size="9" fill="#888888">Fontes: Vale, ANTAQ, IBGE, SNIS 2022-2024 | @quemeomaranhao V84</text>
</svg>
