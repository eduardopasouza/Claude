<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="400" fill="#FAF3E8"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#2B2B2B">QUEM GUARDA A FLORESTA?</text>

  <!-- Two columns -->
  <!-- Left: Population -->
  <rect x="50" y="60" width="330" height="260" fill="#B5533E" rx="10" opacity="0.1"/>
  <text x="215" y="95" text-anchor="middle" font-size="42" font-weight="bold" fill="#B5533E">57.214</text>
  <text x="215" y="120" text-anchor="middle" font-size="14" fill="#B5533E">pessoas indígenas</text>
  <text x="215" y="145" text-anchor="middle" font-size="11" fill="#2B2B2B">Censo IBGE 2022</text>

  <text x="215" y="185" text-anchor="middle" font-size="28" font-weight="bold" fill="#B5533E">&lt; 1%</text>
  <text x="215" y="210" text-anchor="middle" font-size="11" fill="#2B2B2B">da população do Maranhão</text>

  <text x="215" y="250" text-anchor="middle" font-size="16" font-weight="bold" fill="#2D6A4F">72,93%</text>
  <text x="215" y="270" text-anchor="middle" font-size="10" fill="#2B2B2B">vivem em Terras Indígenas</text>

  <text x="215" y="300" text-anchor="middle" font-size="12" fill="#B5533E">+40,27% em 12 anos</text>

  <!-- Right: Forest -->
  <rect x="420" y="60" width="330" height="260" fill="#2D6A4F" rx="10" opacity="0.1"/>
  <text x="585" y="95" text-anchor="middle" font-size="42" font-weight="bold" fill="#2D6A4F">52%</text>
  <text x="585" y="120" text-anchor="middle" font-size="14" fill="#2D6A4F">da floresta que resta</text>
  <text x="585" y="145" text-anchor="middle" font-size="11" fill="#2B2B2B">está em Terras Indígenas</text>

  <text x="585" y="185" text-anchor="middle" font-size="28" font-weight="bold" fill="#C1292E">76%</text>
  <text x="585" y="210" text-anchor="middle" font-size="11" fill="#2B2B2B">da Amazônia maranhense</text>
  <text x="585" y="225" text-anchor="middle" font-size="11" fill="#C1292E">já foi destruída</text>

  <text x="585" y="265" text-anchor="middle" font-size="12" fill="#2D6A4F" font-weight="bold">TIs perderam apenas 1%</text>
  <text x="585" y="280" text-anchor="middle" font-size="10" fill="#2B2B2B">de vegetação (1985-2023)</text>
  <text x="585" y="300" text-anchor="middle" font-size="10" fill="#C1292E">Terras privadas: -28%</text>

  <!-- Central connector -->
  <text x="400" y="360" text-anchor="middle" font-size="13" font-weight="bold" fill="#2B2B2B">Menos de 1% da população guarda mais da metade da floresta.</text>

  <!-- Footer -->
  <text x="400" y="385" text-anchor="middle" font-size="9" fill="#888888">Fontes: IBGE Censo 2022, ISA, MapBiomas/Gov Povos Indígenas | @quemeomaranhao V21</text>
</svg>
