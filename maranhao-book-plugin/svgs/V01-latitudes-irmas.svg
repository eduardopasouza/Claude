<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="400" fill="#FAF3E8"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#2B2B2B">LATITUDES IRMÃS — A Faixa Equatorial</text>

  <!-- World map simplified - equatorial belt -->
  <rect x="50" y="140" width="700" height="120" fill="#E8D5B7" rx="5" opacity="0.5"/>
  <text x="400" y="295" text-anchor="middle" font-size="10" fill="#888888">Faixa equatorial: 5°N a 5°S</text>

  <!-- Equator line -->
  <line x1="50" y1="200" x2="750" y2="200" stroke="#C8952E" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="760" y="204" font-size="9" fill="#C8952E">0°</text>

  <!-- Cities -->
  <!-- São Luís 2.5°S - highlighted -->
  <circle cx="250" cy="207" r="12" fill="#C1292E"/>
  <text x="250" y="175" text-anchor="middle" font-size="11" font-weight="bold" fill="#C1292E">São Luís</text>
  <text x="250" y="188" text-anchor="middle" font-size="9" fill="#C1292E">2,5° S</text>

  <!-- Manaus 3°S -->
  <circle cx="200" cy="209" r="7" fill="#2D6A4F"/>
  <text x="200" y="235" text-anchor="middle" font-size="9" fill="#2D6A4F">Manaus</text>
  <text x="200" y="247" text-anchor="middle" font-size="8" fill="#2D6A4F">3,1° S</text>

  <!-- Quito 0° -->
  <circle cx="150" cy="200" r="7" fill="#1B4965"/>
  <text x="150" y="170" text-anchor="middle" font-size="9" fill="#1B4965">Quito</text>
  <text x="150" y="182" text-anchor="middle" font-size="8" fill="#1B4965">0,2° S</text>

  <!-- Nairobi 1.3°S -->
  <circle cx="530" cy="204" r="7" fill="#B5533E"/>
  <text x="530" y="170" text-anchor="middle" font-size="9" fill="#B5533E">Nairobi</text>
  <text x="530" y="182" text-anchor="middle" font-size="8" fill="#B5533E">1,3° S</text>

  <!-- Kinshasa 4.4°S -->
  <circle cx="480" cy="214" r="7" fill="#5E3A7E"/>
  <text x="480" y="240" text-anchor="middle" font-size="9" fill="#5E3A7E">Kinshasa</text>
  <text x="480" y="252" text-anchor="middle" font-size="8" fill="#5E3A7E">4,4° S</text>

  <!-- Singapura 1.3°N -->
  <circle cx="650" cy="196" r="7" fill="#C8952E"/>
  <text x="650" y="170" text-anchor="middle" font-size="9" fill="#C8952E">Singapura</text>
  <text x="650" y="182" text-anchor="middle" font-size="8" fill="#C8952E">1,3° N</text>

  <!-- Legend -->
  <text x="400" y="340" text-anchor="middle" font-size="11" fill="#2B2B2B">Mesma latitude. Mesma intensidade solar. Destinos radicalmente diferentes.</text>
  <text x="400" y="360" text-anchor="middle" font-size="9" fill="#888888">Fonte: IBGE, coordenadas geográficas | Quem é o Maranhão? V01</text>

  <!-- Logo -->
  <text x="400" y="390" text-anchor="middle" font-size="8" font-weight="bold" fill="#C8952E">@quemeomaranhao</text>
</svg>
