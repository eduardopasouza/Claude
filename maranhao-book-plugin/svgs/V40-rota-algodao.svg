<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="400" fill="#FAF3E8"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#2B2B2B">ROTA DO ALGODÃO — O que ficou em cada ponto</text>
  <text x="400" y="52" text-anchor="middle" font-size="10" fill="#888888">Maranhão, séc. XVIII-XIX</text>

  <!-- Route with arrows -->
  <!-- Node 1: Interior -->
  <rect x="30" y="90" width="140" height="170" fill="#B5533E" rx="8"/>
  <text x="100" y="120" text-anchor="middle" font-size="12" font-weight="bold" fill="#FAF3E8">INTERIOR</text>
  <text x="100" y="140" text-anchor="middle" font-size="9" fill="#E8D5B7">Itapecuru, Caxias, Codó</text>
  <line x1="40" y1="155" x2="160" y2="155" stroke="#FAF3E8" stroke-width="1" opacity="0.5"/>
  <text x="100" y="175" text-anchor="middle" font-size="9" fill="#FAF3E8">Produção:</text>
  <text x="100" y="190" text-anchor="middle" font-size="9" fill="#FAF3E8">escravizados plantam</text>
  <line x1="40" y1="205" x2="160" y2="205" stroke="#FAF3E8" stroke-width="1" opacity="0.5"/>
  <text x="100" y="225" text-anchor="middle" font-size="10" font-weight="bold" fill="#C1292E">O que fica:</text>
  <text x="100" y="245" text-anchor="middle" font-size="11" font-weight="bold" fill="#FAF3E8">NADA</text>

  <!-- Arrow 1 -->
  <polygon points="175,175 195,165 195,185" fill="#C8952E"/>
  <text x="185" y="155" text-anchor="middle" font-size="7" fill="#C8952E">Rio</text>

  <!-- Node 2: São Luís -->
  <rect x="200" y="90" width="140" height="170" fill="#1B4965" rx="8"/>
  <text x="270" y="120" text-anchor="middle" font-size="12" font-weight="bold" fill="#FAF3E8">SÃO LUÍS</text>
  <text x="270" y="140" text-anchor="middle" font-size="9" fill="#E8D5B7">Porto</text>
  <line x1="210" y1="155" x2="330" y2="155" stroke="#FAF3E8" stroke-width="1" opacity="0.5"/>
  <text x="270" y="175" text-anchor="middle" font-size="9" fill="#FAF3E8">Embarque:</text>
  <text x="270" y="190" text-anchor="middle" font-size="9" fill="#FAF3E8">fardo para navio</text>
  <line x1="210" y1="205" x2="330" y2="205" stroke="#FAF3E8" stroke-width="1" opacity="0.5"/>
  <text x="270" y="225" text-anchor="middle" font-size="10" font-weight="bold" fill="#C8952E">O que fica:</text>
  <text x="270" y="245" text-anchor="middle" font-size="9" fill="#FAF3E8">Imposto + comissão</text>

  <!-- Arrow 2 -->
  <polygon points="345" fill="#C8952E"/>
  <line x1="340" y1="175" x2="360" y2="175" stroke="#C8952E" stroke-width="3"/>
  <polygon points="360,168 375,175 360,182" fill="#C8952E"/>
  <text x="355" y="155" text-anchor="middle" font-size="7" fill="#C8952E">Navio</text>

  <!-- Node 3: Lisboa -->
  <rect x="380" y="90" width="140" height="170" fill="#C8952E" rx="8"/>
  <text x="450" y="120" text-anchor="middle" font-size="12" font-weight="bold" fill="#FAF3E8">LISBOA</text>
  <text x="450" y="140" text-anchor="middle" font-size="9" fill="#E8D5B7">Entreposto</text>
  <line x1="390" y1="155" x2="510" y2="155" stroke="#FAF3E8" stroke-width="1" opacity="0.5"/>
  <text x="450" y="175" text-anchor="middle" font-size="9" fill="#FAF3E8">Reexportação:</text>
  <text x="450" y="190" text-anchor="middle" font-size="9" fill="#FAF3E8">Cia. de Pombal</text>
  <line x1="390" y1="205" x2="510" y2="205" stroke="#FAF3E8" stroke-width="1" opacity="0.5"/>
  <text x="450" y="225" text-anchor="middle" font-size="10" font-weight="bold" fill="#2B2B2B">O que fica:</text>
  <text x="450" y="245" text-anchor="middle" font-size="9" fill="#FAF3E8">Lucro comercial</text>

  <!-- Arrow 3 -->
  <line x1="520" y1="175" x2="545" y2="175" stroke="#C8952E" stroke-width="3"/>
  <polygon points="545,168 560,175 545,182" fill="#C8952E"/>
  <text x="540" y="155" text-anchor="middle" font-size="7" fill="#C8952E">Trem</text>

  <!-- Node 4: Manchester -->
  <rect x="565" y="90" width="200" height="170" fill="#2D6A4F" rx="8"/>
  <text x="665" y="120" text-anchor="middle" font-size="12" font-weight="bold" fill="#FAF3E8">MANCHESTER</text>
  <text x="665" y="140" text-anchor="middle" font-size="9" fill="#E8D5B7">Indústria têxtil</text>
  <line x1="575" y1="155" x2="755" y2="155" stroke="#FAF3E8" stroke-width="1" opacity="0.5"/>
  <text x="665" y="175" text-anchor="middle" font-size="9" fill="#FAF3E8">Industrialização:</text>
  <text x="665" y="190" text-anchor="middle" font-size="9" fill="#FAF3E8">algodão vira tecido</text>
  <line x1="575" y1="205" x2="755" y2="205" stroke="#FAF3E8" stroke-width="1" opacity="0.5"/>
  <text x="665" y="225" text-anchor="middle" font-size="10" font-weight="bold" fill="#FAF3E8">O que fica:</text>
  <text x="665" y="245" text-anchor="middle" font-size="12" font-weight="bold" fill="#FAF3E8">MAIOR LUCRO</text>

  <!-- Bottom: production data -->
  <rect x="50" y="290" width="700" height="50" fill="#C8952E" rx="6" opacity="0.15"/>
  <text x="200" y="315" text-anchor="middle" font-size="11" fill="#2B2B2B">1760: <tspan font-weight="bold">651 arrobas</tspan></text>
  <text x="400" y="315" text-anchor="middle" font-size="16" fill="#C8952E" font-weight="bold">46x em 40 anos</text>
  <text x="600" y="315" text-anchor="middle" font-size="11" fill="#2B2B2B">1800: <tspan font-weight="bold">30.000+ arrobas</tspan></text>

  <!-- Paradox -->
  <text x="400" y="365" text-anchor="middle" font-size="12" font-weight="bold" fill="#2B2B2B">O produto muda. A rota muda. O destino não muda.</text>

  <!-- Footer -->
  <text x="400" y="390" text-anchor="middle" font-size="9" fill="#888888">Fontes: MEIRELES, Mário. História do Maranhão, 2001 | @quemeomaranhao V40</text>
</svg>
