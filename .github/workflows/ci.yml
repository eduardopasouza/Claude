name: CI

# Gate de PR. Anti-Vibe Coding: nenhum código entra na main sem passar.
#   - lint (ruff)
#   - typecheck (tsc --noEmit no frontend)
#   - pytest unit + integration + contract (sem live, sem slow)
#   - cobertura mínima no código novo
#
# "live" rodam só em schedule semanal (ver .github/workflows/audit-coletores.yml).

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Backend: lint + unit + integration + contract ----
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: agrojus_test
          POSTGRES_USER: agrojus
          POSTGRES_PASSWORD: agrojus
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U agrojus"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      TEST_DATABASE_URL: postgresql://agrojus:agrojus@localhost:5433/agrojus_test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: System deps (geo libs)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgdal-dev gdal-bin libgeos-dev libproj-dev libspatialindex-dev

      - name: Install Python deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff

      - name: Ruff lint
        working-directory: backend
        run: ruff check app/

      - name: Pytest (unit + integration + contract, sem live/slow)
        working-directory: backend
        run: |
          pytest -m "not live and not slow" \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            -q

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: backend/coverage.xml

  # ---- Frontend: typecheck + lint + vitest ----
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend_v2/package-lock.json

      - name: Install deps
        working-directory: frontend_v2
        run: npm ci

      - name: TypeScript check
        working-directory: frontend_v2
        run: npx tsc --noEmit

      - name: ESLint
        working-directory: frontend_v2
        run: npx eslint src/ --max-warnings=0

      - name: Vitest
        working-directory: frontend_v2
        # Roda só se houver script test definido — evita falha antes do setup
        run: |
          if grep -q '"test"' package.json; then
            npm test -- --run
          else
            echo "::notice::vitest ainda não configurado; skip"
          fi
