name: fly-deploy

# Deploy do sim-global no Fly.io. Roda do GitHub Actions porque o
# sandbox onde fui montado não consegue subir builder Docker
# confiável. O runner do Actions tem Docker e rede livre, então
# `flyctl deploy` funciona normalmente daqui.

on:
  push:
    branches:
      - claude/brasil-sim-mvp-5ubSa
      - main
    paths:
      - "sim-global/**"
      - ".github/workflows/fly-deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: deploy sim-global
    runs-on: ubuntu-latest
    concurrency:
      group: fly-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: deploy
        working-directory: sim-global
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only --yes
